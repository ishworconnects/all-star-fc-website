<svg width="640" height="360" viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Sponsor placeholder</title>
  <desc id="desc">A placeholder graphic for future sponsor logos.</desc>
  <defs>
    <linearGradient id="bg" x1="40" y1="40" x2="600" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#173b78"/>
      <stop offset="1" stop-color="#0f2246"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" rx="32" fill="url(#bg)"/>
  <rect x="56" y="56" width="528" height="248" rx="24" fill="none" stroke="#ffffff" stroke-opacity="0.25" stroke-width="4"/>
  <text x="320" y="156" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="34" fill="#ffffff">SPONSOR SLOT</text>
  <text x="320" y="206" text-anchor="middle" font-family="Trebuchet MS, sans-serif" font-size="22" fill="#f0e4c6">Replace with a real partner logo</text>
</svg>
